<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generazione in corso...</title>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 50px 60px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            border: 4px solid rgba(0,0,0,0.1);
            border-top: 4px solid #0072ff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            font-weight: 300;
            margin: 0 0 15px 0;
            letter-spacing: 1px;
            color: #2c3e50;
        }
        p {
            color: #666;
            font-size: 0.9em;
            margin: 0;
        }
        .logo {
            max-height: 70px;
            margin-bottom: 25px;
            display: inline-block;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="glass-panel">
        <img src="{{ url_for('static', filename='LogoLaPrimavera.gif') }}" alt="La Primavera Logo" class="logo">
        <div class="loader"></div>
        <h2>Richiesta ad AI in corso...</h2>
        <p id="status-text">Generazione dell'immagine tramite Gemini</p>
    </div>

    <script>
        const scenario = "{{ scenario }}";
        const finitura = "{{ finitura }}";
        
        fetch(`/api/generate?scenario=${encodeURIComponent(scenario)}&finitura=${encodeURIComponent(finitura)}`)
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => { throw new Error(text) });
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    window.location.href = `/result?filename=${encodeURIComponent(data.filename)}`;
                } else {
                    document.getElementById('status-text').innerText = "Errore: " + data.error;
                    document.getElementById('status-text').style.color = "#ff6b6b";
                    document.querySelector('.loader').style.display = 'none';
                }
            })
            .catch(error => {
                document.getElementById('status-text').innerText = "Errore: " + error.message;
                document.getElementById('status-text').style.color = "#ff6b6b";
                document.querySelector('.loader').style.display = 'none';
            });
    </script>
</body>
</html>
